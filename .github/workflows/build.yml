name: build kernel

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged
    timeout-minutes: 350

    steps:
      - name: Free up disk space on the host
        run: |
          # ubuntu-latest gives ~14GB free; kernel + zfs + thin-LTO needs more.
          # Inside the arch container we can't touch the host FS; this step is a no-op
          # placeholder kept for clarity. If we OOM on disk, switch to a self-hosted runner
          # or use jlumbroso/free-disk-space before starting the container.
          df -h

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            git sudo ccache \
            bc binutils cpio gettext glibc libelf libgcc openssl pahole perl python \
            rust rust-bindgen rust-src tar xxhash xz zlib zstd \
            clang llvm lld

      - uses: actions/checkout@v4

      - name: Set up unprivileged build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /home/builder/.ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('PKGBUILD','config') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          mkdir -p /home/builder/.ccache
          chown -R builder:builder /home/builder/.ccache
          sudo -u builder ccache -M 5G
          sudo -u builder ccache -z

      - name: Build kernel packages
        # NOTE: _processor_opt=meteorlake injects -march=meteorlake -mtune=meteorlake
        # via KCFLAGS so the kernel is tuned for the *target* CPU (the dev's MTL laptop),
        # not for whichever runner happens to host this job. Identical to a local
        # _processor_opt=native build on a Meteor Lake host.
        run: |
          sudo -u builder env \
            CCACHE_DIR=/home/builder/.ccache \
            PATH=/usr/lib/ccache/bin:$PATH \
            _compiler=llvm \
            _use_llvm_lto=none \
            _processor_opt=meteorlake \
            makepkg -s --noconfirm --noprogressbar

      - name: Verify Rust external module development support
        run: |
          set -euo pipefail
          source_dir="$(find src -mindepth 1 -maxdepth 1 -type d -name 'cachyos-*' -print -quit)"
          grep -qx 'CONFIG_RUST=y' "$source_dir/.config"
          grep -qx 'CONFIG_LTO_NONE=y' "$source_dir/.config"
          test -s "$source_dir/rust/libkernel.rmeta"

          headers_pkg="$(find . -maxdepth 1 -type f -name '*-headers-*.pkg.tar.zst' -print -quit)"
          test_root="$(mktemp -d)"
          trap 'rm -rf "$test_root"' EXIT
          bsdtar -xf "$headers_pkg" -C "$test_root"
          kernel_dir="$(find "$test_root/usr/lib/modules" -mindepth 2 -maxdepth 2 -type d -name build -print -quit)"
          test -s "$kernel_dir/rust/libkernel.rmeta"
          test -f "$kernel_dir/rust/Makefile"

          module_dir="$test_root/rust-module"
          mkdir "$module_dir"
          cp "$source_dir/samples/rust/rust_minimal.rs" "$module_dir/"
          printf 'obj-m := rust_minimal.o\n' > "$module_dir/Kbuild"
          make -C "$kernel_dir" M="$module_dir" LLVM=1
          make -C "$kernel_dir" M="$module_dir" LLVM=1 rust-analyzer
          find "$module_dir" "$kernel_dir" -name rust-project.json -type f -size +0c -print -quit | grep -q .

      - name: ccache stats
        if: always()
        run: sudo -u builder ccache -s

      - name: Upload packages
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linux-okhsunrog-lts-pkgs
          path: '*.pkg.tar.zst'
          if-no-files-found: error
          retention-days: 14
